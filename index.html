<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<style>
body{font-family:Arial,sans-serif;text-align:center;background:#222;color:#fff}
#board{display:grid;grid-template-columns:repeat(9,40px);gap:2px;justify-content:center;margin:20px auto}
button.cell{width:40px;height:40px;font-size:18px}
</style>
</head>
<body>
<h1>💣 Minesweeper</h1>
<p>ไฟล์ตัวอย่าง (อัปโหลดแทนไฟล์เดิมได้)</p>
<div id="board"></div>
<script>
const b=document.getElementById('board');
for(let i=0;i<81;i++){
 const x=document.createElement('button');
 x.className='cell';
 x.textContent='';
 x.onclick=()=>x.textContent='🟦';
 b.appendChild(x);
}
</script>
</body>
</html>
