<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#1f1f1f;color:#fff;text-align:center}
h1{margin:20px}
#board{display:grid;grid-template-columns:repeat(9,40px);gap:3px;justify-content:center;margin:20px auto}
.cell{width:40px;height:40px;border:none;background:#777;font-size:18px;font-weight:bold;cursor:pointer}
.cell:hover{background:#888}.open{background:#ddd}.mine{background:#f66}
.restart{padding:10px 18px;font-size:16px}#message{font-size:20px;font-weight:bold}
</style></head><body>
<h1>💣 Minesweeper</h1>
<button class="restart" onclick="initGame()">🔄 Restart</button>
<div id="message"></div><div id="board"></div>
<script>
const SIZE=9,MINES=10;let board,opened,flagged;
function initGame(){
board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
opened=Array.from({length:SIZE},()=>Array(SIZE).fill(false));
flagged=Array.from({length:SIZE},()=>Array(SIZE).fill(false));
let p=0;while(p<MINES){let x=Math.floor(Math.random()*SIZE),y=Math.floor(Math.random()*SIZE);if(board[y][x]!="*"){board[y][x]="*";p++;}}
for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){if(board[y][x]=="*")continue;let c=0;for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){let nx=x+dx,ny=y+dy;if(nx>=0&&ny>=0&&nx<SIZE&&ny<SIZE&&board[ny][nx]=="*")c++;}board[y][x]=c;}
draw();message.textContent="";
}
function draw(){boardDiv=document.getElementById("board");boardDiv.innerHTML="";
for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){let b=document.createElement("button");b.className="cell"+(opened[y][x]?" open":"");
if(opened[y][x]){if(board[y][x]=="*"){b.textContent="💣";b.classList.add("mine")}else b.textContent=board[y][x]||"";}
else b.textContent=flagged[y][x]?"🚩":"";
b.onclick=()=>openCell(x,y);
b.oncontextmenu=e=>{e.preventDefault();if(!opened[y][x]){flagged[y][x]=!flagged[y][x];draw();}};
boardDiv.appendChild(b);}}
function openCell(x,y){if(opened[y][x]||flagged[y][x])return;opened[y][x]=true;
if(board[y][x]=="*"){for(let yy=0;yy<SIZE;yy++)for(let xx=0;xx<SIZE;xx++)if(board[yy][xx]=="*")opened[yy][xx]=true;draw();message.textContent="💥 Game Over";return;}
if(board[y][x]==0){for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){let nx=x+dx,ny=y+dy;if(nx>=0&&ny>=0&&nx<SIZE&&ny<SIZE)openCell(nx,ny);}}
draw();
}
initGame();
</script></body></html>
